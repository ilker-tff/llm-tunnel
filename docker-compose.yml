services:
  proxy:
    build: ./proxy
    container_name: llm-tunnel-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - API_KEY=${API_KEY:?Set API_KEY in .env}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - PORT=8080
      - DEFAULT_MODEL=${MODEL:-gemma4:e4b}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-60}

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: llm-tunnel-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:-}
    depends_on:
      - proxy
    profiles:
      - tunnel
